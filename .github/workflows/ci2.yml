name: Production CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  lint:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install -r requirements.txt

      - name: Lint
        run: |
          flake8 .

  test:

    needs: lint

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install -r requirements.txt

      - name: Test
        run: |
          pytest

  build:

    needs: test

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build Artifact
        run: |
          mkdir build
          cp app.py build/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-build
          path: build/
